<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen">
    <div class="w-full max-w-md mt-16 mb-8 px-6 py-8 bg-white rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold text-center text-green-800 mb-6">Login</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit"
                class="w-full bg-green-700 hover:bg-green-800 text-white py-2 px-4 rounded font-semibold transition-colors">
                Login
            </button>
        </form>
        {% if form.errors %}
            <div class="mt-4 text-red-600">
                {% for field in form %}
                    {% for error in field.errors %}
                        <div>{{ error }}</div>
                    {% endfor %}
                {% endfor %}
                {% for error in form.non_field_errors %}
                    <div>{{ error }}</div>
                {% endfor %}
            </div>
        {% endif %}
    </div>
</body>
</html>

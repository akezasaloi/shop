{% extends "base.html" %}
{% block content %}
    <div class="bg-white rounded-lg shadow-lg p-8 flex flex-col items-center w-full max-w-md">
        <img src="https://img.icons8.com/color/96/000000/grocery-store.png" alt="Grocery Icon" class="mb-4">
        <h2 class="text-2xl font-bold mb-6 text-green-800">Welcome to Akeza Grocery Shop</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4 w-full">
                <label for="id_username" class="block text-green-600 mb-2">Username</label>
                <input type="text" name="username" id="id_username" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500" required>
            </div>
            <div class="mb-6 w-full">
                <label for="id_password" class="block text-green-600 mb-2">Password</label>
                <input type="password" name="password" id="id_password" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500" required>
            </div>
            <button type="submit" class="w-full bg-green-700 hover:bg-green-800 text-white py-2 rounded font-semibold">
                Login
            </button>
        </form>
        {% if form.errors %}
            <div class="mt-4 text-red-600">
                {% for error in form.non_field_errors %}
                    <div>{{ error }}</div>
                {% endfor %}
            </div>
        {% endif %}
        <p class="mt-4 text-sm text-gray-500">Hint: Username: <b>Akeza</b>, Password: <b>223458@akirachix</b></p>
    </div>
{% endblock %}
